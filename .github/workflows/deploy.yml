name: Deploy to Vercel

on:
  push:
    branches: [main]

# Prevent concurrent deploys — cancel in-flight run if new push arrives
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Validate all required secrets exist before touching Vercel ──
      - name: Validate Secrets
        run: |
          MISSING=0
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && echo "❌ VERCEL_TOKEN is missing" && MISSING=1
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && echo "❌ VERCEL_ORG_ID is missing" && MISSING=1
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && echo "❌ VERCEL_PROJECT_ID is missing" && MISSING=1
          [ $MISSING -ne 0 ] && echo "Fix secrets at: Settings → Secrets and variables → Actions" && exit 1
          echo "✅ All secrets present"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Pull project settings (framework detection, env vars, etc.)
      - name: Pull Vercel Project Settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Build the project (Vercel handles static/Next.js/etc. automatically)
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Deploy the prebuilt output — fastest, most reliable
      - name: Deploy
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment Summary
        run: echo "🚀 Production deployment live at ${{ steps.deploy.outputs.url }}"
